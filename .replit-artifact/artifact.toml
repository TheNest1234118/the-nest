kind = "web"
previewPath = "/"
title = "The Nest"
version = "1.0.0"
id = "artifacts/the-nest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18644

[services.development]
run = "pnpm --filter @workspace/the-nest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/the-nest", "run", "build" ]
publicDir = "artifacts/the-nest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18644"
BASE_PATH = "/"
